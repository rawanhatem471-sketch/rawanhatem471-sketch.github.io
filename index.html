<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rawan Hatem | Content Creator</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="home-page">

    <main id="readme-content">
        Loading...
    </main>

    <script>
        fetch('README.md')
            .then(response => response.text())
            .then(markdown => {

                const content = document.getElementById('readme-content');

                content.innerHTML = marked.parse(markdown);

                /* =========================
                   SKILLS
                ========================= */

                const skillsHeading = [...content.querySelectorAll('h2')]
                    .find(h2 => h2.textContent.trim() === 'Skills');

                if (skillsHeading) {

                    const skillsList = skillsHeading.nextElementSibling;

                    if (skillsList && skillsList.tagName === 'UL') {
                        skillsList.classList.add('skills-list');
                    }
                }

                /* =========================
                   CURRENTLY EXPLORING
                ========================= */

                const exploringHeading = [...content.querySelectorAll('h2')]
                    .find(h2 => h2.textContent.trim() === 'Currently Exploring');

                if (exploringHeading) {

                    const exploringList = exploringHeading.nextElementSibling;

                    if (exploringList && exploringList.tagName === 'UL') {
                        exploringList.classList.add('skills-list');
                    }
                }

            /* =========================
   MY PROJECTS
========================= */

const projectsHeading = [...content.querySelectorAll('h2')]
    .find(h2 => h2.textContent.trim() === 'My Projects');

if (projectsHeading) {

    const projectList = document.createElement('div');
    projectList.className = 'project-list';

    let current = projectsHeading.nextElementSibling;

    while (current) {

        const next = current.nextElementSibling;

        if (current.tagName === 'H3') {

            const card = document.createElement('a');

            const projectName = current.textContent.trim();

            if (projectName === 'Campaigns') {
                card.href = 'campaigns.html';
            }

            if (projectName === 'Scripts') {
                card.href = 'scripts.html';
            }

            if (projectName === 'Creative_Ideas') {
                card.href = 'creative-ideas.html';
            }

            card.className = 'project-card';

            const title = document.createElement('span');
            title.textContent = projectName;

            const description = current.nextElementSibling;

            card.appendChild(title);

            if (description && description.tagName === 'P') {
                card.appendChild(description.cloneNode(true));
            }

            projectList.appendChild(card);
        }

        current = next;
    }

    projectsHeading.after(projectList);
}    

            })
            .catch(error => {

                document.getElementById('readme-content').innerHTML =
                    '<p>Could not load README.</p>';

            });
    </script>

</body>

</html>
